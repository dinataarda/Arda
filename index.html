<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story - Fixed Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Foto Utama */
        .slide .item {
            width: 150px;
            height: 220px;
            position: absolute;
            top: 70%; /* Posisi thumbnail */
            transform: translateY(-50%);
            border-radius: 15px;
            background-position: center;
            background-size: cover;
            transition: 0.7s ease-in-out;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
        }

        /* Full Screen untuk Item 1 & 2 */
        .slide .item:nth-child(1),
        .slide .item:nth-child(2) {
            top: 0;
            left: 0;
            transform: none;
            width: 100%;
            height: 100%;
            border-radius: 0;
        }

        /* Jarak Thumbnail di Desktop biar gak numpuk */
        .slide .item:nth-child(3) { left: 50%; }
        .slide .item:nth-child(4) { left: calc(50% + 170px); }
        .slide .item:nth-child(5) { left: calc(50% + 340px); }
        .slide .item:nth-child(n + 6) { left: calc(50% + 510px); opacity: 0; }

        /* TEKS - Sekarang pakai jarak dari BOTTOM agar stabil */
        .item .content {
            position: absolute;
            bottom: 180px; /* Jarak aman di atas thumbnail */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            text-align: center;
            color: #fff;
            display: none;
            z-index: 100;
            text-shadow: 0 4px 10px rgba(0,0,0,1);
        }

        .slide .item:nth-child(2) .content {
            display: block;
        }

        .content .name {
            font-size: clamp(30px, 6vw, 55px);
            text-transform: uppercase;
            font-weight: 800;
            opacity: 0;
            animation: moveUp 0.8s ease-out 0.2s forwards;
        }

        .content .des {
            font-size: clamp(14px, 2vw, 18px);
            margin-top: 5px;
            font-weight: 300;
            opacity: 0;
            animation: moveUp 0.8s ease-out 0.4s forwards;
        }

        @keyframes moveUp {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* Tombol Navigasi */
        .button {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            z-index: 1000;
        }

        .button button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid #fff;
            background: rgba(0,0,0,0.4);
            color: #fff;
            cursor: pointer;
            margin: 0 8px;
            transition: 0.3s;
        }

        .button button:hover {
            background: #fff;
            color: #000;
        }

        /* FIX BUAT MOBILE AGAR TIDAK TERLALU KE BAWAH */
        @media screen and (max-width: 600px) {
            .slide .item {
                width: 100px;
                height: 150px;
                top: 80%;
            }
            .slide .item:nth-child(3) { left: 30%; }
            .slide .item:nth-child(4) { left: calc(30% + 110px); }
            .slide .item:nth-child(5) { left: calc(30% + 220px); }
            
            .item .content {
                bottom: 220px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="slide">
            <div class="item" style="background-image: url('Foto1.jpg');">
                <div class="content">
                    <div class="name">OUR STORY</div>
                    <div class="des">The beginning of something beautiful.</div>
                </div>
            </div>
            <div class="item" style="background-image: url('Foto2.jpg');">
                <div class="content">
                    <div class="name">NIGHT VIBES</div>
                    <div class="des">Under the city lights with you.</div>
                </div>
            </div>
            <div class="item" style="background-image: url('Foto3.jpg');">
                <div class="content">
                    <div class="name">MEMORIES</div>
                    <div class="des">Captured moments that last forever.</div>
                </div>
            </div>
            <div class="item" style="background-image: url('Foto4.jpg');">
                <div class="content">
                    <div class="name">SMILE</div>
                    <div class="des">Your laugh is my favorite soundtrack.</div>
                </div>
            </div>
            <div class="item" style="background-image: url('Foto5.jpg');">
                <div class="content">
                    <div class="name">FOREVER</div>
                    <div class="des">To many more adventures ahead.</div>
                </div>
            </div>
        </div>

        <div class="button">
            <button class="prev">❮</button>
            <button class="next">❯</button>
        </div>
    </div>

    <script>
        let next = document.querySelector('.next')
        let prev = document.querySelector('.prev')

        next.addEventListener('click', function(){
            let items = document.querySelectorAll('.item')
            document.querySelector('.slide').appendChild(items[0])
        })

        prev.addEventListener('click', function(){
            let items = document.querySelectorAll('.item')
            document.querySelector('.slide').prepend(items[items.length - 1])
        })
    </script>
</body>
</html>
